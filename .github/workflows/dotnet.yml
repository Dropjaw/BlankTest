name: .NET

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master, phase-7-4-match-rules-wpf-ui ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore BlankTest.sln
      - name: Build
        run: dotnet build BlankTest.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test BlankTest.sln --configuration Release --no-build
